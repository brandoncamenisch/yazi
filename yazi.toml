[mgr]
show_hidden = true
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true

[theme]
use = "theme.toml"

[opener]
edit = [
  { run = 'nvim "$@"', block = true }
]
lazygit = [
  { run = 'lazygit', block = true }
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { name = "*", use = "edit" }
]
